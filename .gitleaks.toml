title = "Proving Grounds gitleaks config"

[allowlist]
description = "Allowlisted paths and patterns"
paths = [
  '''\.env\.example''',
  '''THIRD_PARTY_NOTICES\.md''',
  '''README\.md''',
]

# Allow example/placeholder values in .env.example
regexes = [
  '''your-.*-token''',
  '''your-.*-key''',
  '''generate-a-.*-secret''',
  '''postgres://user:password''',
]
